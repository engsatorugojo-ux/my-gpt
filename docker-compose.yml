version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: my_gpt
      POSTGRES_USER: gpt_user
      POSTGRES_PASSWORD: gpt_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gpt_user -d my_gpt"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://gpt_user:gpt_pass@db:5432/my_gpt
      JWT_SECRET: my_gpt_jwt_secret_change_in_prod
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      PORT: 4002
      NODE_ENV: production
    ports:
      - "4002:4002"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "3003:80"
    depends_on:
      - backend

volumes:
  pgdata:
